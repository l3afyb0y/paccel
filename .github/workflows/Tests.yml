name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test_core_function:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Test acceleration function
        run: make test
      - name: Test CLI
        run: cargo test --workspace
      - name: Check paccel identity
        run: bash tests/identity.test.sh
